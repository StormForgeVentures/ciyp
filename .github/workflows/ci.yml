name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    # .npmrc references ${NODE_AUTH_TOKEN}; GITHUB_TOKEN satisfies substitution and reads
    # @stormforgeventures/*. When @theamazingwolf/sport-* deps land (PRD-002 §2.0), swap in a
    # cross-org read:packages secret (SPORT_PACKAGES_TOKEN) — GITHUB_TOKEN cannot read that org.
    env:
      NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build

      - name: Test (includes dependency-lint purity gates)
        run: pnpm test

      - name: Voice (Python) tests
        working-directory: apps/voice
        run: |
          python -m pip install -r requirements-dev.txt
          python -m pytest
