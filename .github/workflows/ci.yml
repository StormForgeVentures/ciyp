name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    # .npmrc references ${NODE_AUTH_TOKEN}; GITHUB_TOKEN satisfies substitution and reads
    # @stormforgeventures/*. When @theamazingwolf/sport-* deps land (PRD-002 §2.0), swap in a
    # cross-org read:packages secret (SPORT_PACKAGES_TOKEN) — GITHUB_TOKEN cannot read that org.
    env:
      NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      # @ciyp/db seed + seed-verify + RLS isolation test run against this service.
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/postgres
      PGPASSWORD: postgres
    # pgvector Postgres (major 17, matches supabase/config.toml) — the migrations
    # need vector + the `authenticated` role; both are provisioned below.
    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s --health-timeout 5s --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      # pnpm ignores an _authToken line in the committed project .npmrc (anti-leak), so write
      # GitHub Packages auth to the USER ~/.npmrc. SPORT_PACKAGES_TOKEN is a cross-org
      # read:packages PAT covering BOTH @theamazingwolf (sport-*) and @stormforgeventures;
      # falls back to GITHUB_TOKEN (StormForgeVentures only) so non-sport installs still work.
      - name: Configure GitHub Packages auth
        env:
          SPORT_PACKAGES_TOKEN: ${{ secrets.SPORT_PACKAGES_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TOKEN="${SPORT_PACKAGES_TOKEN:-$GITHUB_TOKEN}"
          echo "//npm.pkg.github.com/:_authToken=${TOKEN}" >> ~/.npmrc

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build

      - name: Install postgres client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Provision Supabase-parity roles
        run: |
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -c "create role authenticated nologin;" \
            -c "create role anon nologin;" -c "create role service_role nologin bypassrls;"

      - name: Apply migrations
        run: |
          for f in $(ls supabase/migrations/*.sql | sort); do
            echo "applying $f"
            psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f "$f"
          done

      - name: Instance-agnostic guard (no donor-coach identifiers in schema + seed)
        run: |
          if grep -rniE 'kyle|empowered.leader|reconnector|stabilizer|self_led|embodied_leader|catapult|mastermind|concierge|five_planes|harmonizer' \
               supabase/migrations packages/db/src/content; then
            echo "::error::donor-coach (Kyle-era) identifier found in schema/seed content"; exit 1
          fi
          echo "instance-agnostic: clean"

      - name: Seed (uses committed content-hash embedding fixtures — no Voyage call)
        run: pnpm seed

      - name: Seed-verify (asserts every seeded shape; fails CI on regression)
        run: pnpm seed:verify

      - name: Test (RLS isolation + contracts + dependency-lint purity gates)
        run: pnpm test

      - name: Voice (Python) tests
        working-directory: apps/voice
        run: |
          python -m pip install -r requirements-dev.txt
          python -m pytest
