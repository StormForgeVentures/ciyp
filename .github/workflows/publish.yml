# Publishes @stormforgeventures/ciyp-shared + @stormforgeventures/ciyp-ui-tokens to GitHub Packages (ADR-004).
# Cadence: manual tagged releases during v1 (prd-001a Q-2). Trigger by pushing a tag
# `shared-vX.Y.Z` (publishes both packages at their package.json versions).
#
# PREREQ (operator, one-time): the repo lives in the StormForgeVentures GitHub org, so
# packages publish under the @stormforgeventures scope (GitHub Packages requires scope =
# repo owner); ciyp-template installs with a read-scoped org token. No long-lived tokens
# in this repo. (sport-ai-sdk packages remain @theamazingwolf — separate org token.)
name: Publish shared packages

on:
  push:
    tags:
      - 'shared-v*'

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://npm.pkg.github.com

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Verify (typecheck + build + test + purity gates)
        run: pnpm typecheck && pnpm build && pnpm test

      - name: Publish @stormforgeventures/ciyp-shared
        run: pnpm --filter @stormforgeventures/ciyp-shared publish --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish @stormforgeventures/ciyp-ui-tokens
        run: pnpm --filter @stormforgeventures/ciyp-ui-tokens publish --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
